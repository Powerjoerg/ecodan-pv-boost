# ==========================================
# WEIHNACHTSBELEUCHTUNG
# ==========================================
- id: weihnachtsbeleuchtung_17_an
  alias: Weihnachtsbeleuchtung 17 Uhr AN
  triggers:
  - at: '17:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: group.weihnachtsbeleuchtung
    action: homeassistant.turn_on
  mode: single

- id: weihnachtsbeleuchtung_22_aus
  alias: Weihnachtsbeleuchtung 22 Uhr AUS
  triggers:
  - at: '22:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: group.weihnachtsbeleuchtung
    action: homeassistant.turn_off
  mode: single

# ==========================================
# WP TAKTUNG & MONITORING
# ==========================================
- id: wp_taktung_zaehlen
  alias: WP Taktung - Start zählen
  description: Zählt jeden WP-Start wenn Verdichter über 5 Hz geht
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    above: 5
    for:
      minutes: 1
    trigger: numeric_state
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.increment
  mode: single

- id: wp_taktung_reset
  alias: WP Taktung - Reset Mitternacht
  description: Setzt die WP-Zähler jeden Tag um Mitternacht zurück
  triggers:
  - at: '00:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.reset
  - target:
      entity_id: counter.wp_abtauzyklen_heute
    action: counter.reset
  - target:
      entity_id: counter.wp_kurzzyklen_heute
    action: counter.reset
  mode: single

- id: wp_abtauzyklus_zaehlen
  alias: WP Taktung - Abtauzyklus zählen & Filtern
  description: Zählt Abtauvorgänge und filtert sie aus der Taktung heraus
  triggers:
  - entity_id: sensor.mitsubishi_wp_abtaubetrieb_raw
    to: '2'
    trigger: state
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_abtauzyklen_heute
    action: counter.increment
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.decrement
  mode: single

# ==========================================
# WP PV-BOOST LOGIK (Nur Zustands-Flag setzen!)
# ==========================================
- id: wp_boost_aktivieren
  alias: WP Boost bei PV-Überschuss aktivieren
  description: Setzt Boost Flag auf ON (Watchdog übernimmt den Modbus Befehl)
  triggers:
  - entity_id: sensor.feed_in
    above: 1.2
    for:
      minutes: 5
    trigger: numeric_state
  - entity_id: sensor.battery_soc_1
    above: 50
    for:
      minutes: 5
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: sensor.feed_in
    above: 1.2
  - condition: numeric_state
    entity_id: sensor.battery_soc_1
    above: 50
  - condition: numeric_state
    entity_id: sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww
    below: 59
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'off'
  - condition: time
    after: '07:00:00'
    before: '20:00:00'
  actions:
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_on
  - action: notify.persistent_notification
    data:
      title: WP Boost angefordert ☀️
      message: "PV-Überschuss erkannt. Watchdog delegiert 60°C Ladung."
  mode: single

- id: wp_boost_beenden
  alias: WP Boost beenden
  description: Setzt Boost Flag auf OFF (Watchdog schickt WP in Zwangsschlaf)
  triggers:
  - at: '21:00:00'
    trigger: time
  - entity_id: sensor.battery_soc_1
    below: 45
    for:
      minutes: 5
    trigger: numeric_state
  - entity_id: sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww
    above: 59.5
    for:
      minutes: 1
    trigger: numeric_state
  - entity_id: sensor.feed_in
    below: 0.8
    for:
      minutes: 10
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'on'
  actions:
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_off
  - action: notify.persistent_notification
    data:
      title: WP Boost beendet 🌙
      message: "PV-Boost Flag entfernt. Watchdog bewertet Zustand neu."
  mode: single

# ==========================================
# ZAPPI SMART CHARGE (FORD KUGA)
# ==========================================
- id: zappi_smart_charge_solar
  alias: Zappi - Laden starten bei PV-Überschuss (Tags)
  triggers:
  - entity_id: sensor.feed_in
    above: 1.4
    for:
      minutes: 5
    trigger: numeric_state
  conditions:
  - condition: template
    value_template: >
      {{ states('sensor.myenergi_zappi_15553841_plug_status') in ['Connected', 'Charging', 'Waiting for EV'] }}
  - condition: numeric_state
    entity_id: sensor.battery_soc_1
    above: 80
  actions:
  - target:
      entity_id: select.myenergi_zappi_15553841_charge_mode
    data:
      option: ECO+
    action: select.select_option
  mode: single

- id: zappi_smart_charge_night
  alias: Zappi - Nacht-Ladung
  triggers:
  - at: '01:00:00'
    trigger: time
  conditions:
  - condition: template
    value_template: >
      {{ states('sensor.myenergi_zappi_15553841_plug_status') in ['Connected', 'Charging', 'Waiting for EV'] }}
  actions:
  - target:
      entity_id: select.myenergi_zappi_15553841_charge_mode
    data:
      option: FAST
    action: select.select_option
  mode: single

- id: zappi_smart_charge_stop
  alias: Zappi - Ladung beenden
  triggers:
  - at: '07:00:00'
    trigger: time
  - platform: sun
    event: sunset
  actions:
  - target:
      entity_id: select.myenergi_zappi_15553841_charge_mode
    data:
      option: 'Off'
    action: select.select_option
  mode: single

# ==========================================
# WP HEIZKREISPUMPE FREIGABE
# ==========================================
- id: wp_umwaelzpumpe_freigabe_an
  alias: WP Heizkreispumpe AN
  description: Schaltet IN1 ein, wenn das Haus Heizbedarf hat
  triggers:
  - entity_id: binary_sensor.haus_heizbedarf
    to: 'on'
    trigger: state
  - platform: homeassistant
    event: start
  conditions:
  - condition: state
    entity_id: binary_sensor.haus_heizbedarf
    state: 'on'
  actions:
  - target:
      entity_id: switch.wp_thermostat_in_1
    action: switch.turn_on
  mode: single

- id: wp_umwaelzpumpe_freigabe_aus
  alias: WP Heizkreispumpe AUS
  description: Schaltet IN1 aus, wenn kein Raum mehr heizt
  triggers:
  - entity_id: binary_sensor.haus_heizbedarf
    to: 'off'
    for:
      minutes: 10
    trigger: state
  actions:
  - target:
      entity_id: switch.wp_thermostat_in_1
    action: switch.turn_off
  mode: single

# ==========================================
# WP WATCHDOG (ZENTRALE STATE MACHINE - THE BRAIN)
# ==========================================
- id: wp_thermostat_watchdog
  alias: WP Thermostat & Modbus - Watchdog State Machine
  description: Berechnet das gültige Ziel nach harter Priorität und ist DIE EINZIGE Modbus-Schreibinstanz!
  mode: single
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: time_pattern
    minutes: "/10"
  conditions: []
  actions:
  # --- 1. Ziel berechnen ---
  - variables:
      ziel_soll: >
        {% if is_state('input_boolean.wp_boost_aktiv', 'on') %}
          60
        {% elif is_state('sensor.wp_ladewaechter', 'True') %}
          50
        {% else %}
          40
        {% endif %}
  # --- 2. HA Synchronisieren (Anzeige für Dashboard) ---
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: "{{ ziel_soll }}"
    action: input_number.set_value
  # --- 3. Modbus Write (EINZIGE INSTANZ) ---
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: "{{ (ziel_soll | int) * 100 }}"
  # --- 4. Shelly Fallback (Hardware Timeout Reset) ---
  - if:
    - condition: state
      entity_id: switch.wp_thermostat_in_1
      state: 'on'
    then:
    - target:
        entity_id: switch.wp_thermostat_in_1
      action: switch.turn_on

