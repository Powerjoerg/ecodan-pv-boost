# ============================================================
# TEMPLATE-SENSOREN (Wärmepumpe & Ladewächter)
# ============================================================

template:
  - sensor:
      # --- Shelly Pro 3EM: WP Verbrauch (Gesamtberechnung) ---
      - name: "WP Aussen Gesamt"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.shellypro3em_e08cfe95cbe0_phase_a_leistung') | float(0) * 3 }}

      - name: "WP Heizstab Gesamt"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.shellypro3em_e08cfe95cbe0_phase_b_leistung') | float(0) * 3 }}

      - name: "WP Innen Gesamt"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.shellypro3em_e08cfe95cbe0_phase_c_leistung') | float(0) }}

      - name: "WP Gesamtverbrauch"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.shellypro3em_e08cfe95cbe0_phase_a_leistung') | float(0) * 3)
           + (states('sensor.shellypro3em_e08cfe95cbe0_phase_b_leistung') | float(0) * 3)
           + (states('sensor.shellypro3em_e08cfe95cbe0_phase_c_leistung') | float(0)) }}

      - name: "WP Betriebsart Numerisch"
        state: >
          {{ states('sensor.mitsubishi_wp_betriebsart_raw') | int(0) }}
        state_class: measurement
        attributes:
          modus: >
            {% set modi = {0: 'Stopp', 1: 'Warmwasser', 2: 'Heizen', 3: 'Kühlen'} %}
            {{ modi.get(states('sensor.mitsubishi_wp_betriebsart_raw') | int(0), 'Unbekannt') }}

      # --- Wärmeleistung aus Durchfluss und Temperaturdifferenz ---
      - name: "WP Waermeleistung"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set freq = states('sensor.mitsubishi_wp_warmepumpe_frequenz') | float(0) %}
          {% set flow = states('sensor.mitsubishi_wp_durchflussmenge') | float(0) %}
          {% set vl = states('sensor.mitsubishi_wp_vorlauftemperatur') | float(0) %}
          {% set rl = states('sensor.mitsubishi_wp_rucklauftemperatur') | float(0) %}
          {% if freq > 5 and flow > 0 and (vl - rl) > 0.5 %}
            {{ (flow * (vl - rl) * 4186 / 60) | round(0) }}
          {% else %}
            0
          {% endif %}

      # --- COP Momentan (behält letzten Wert) ---
      - name: "WP COP"
        unit_of_measurement: ""
        state: >
          {% set flow = states('sensor.mitsubishi_wp_durchflussmenge') | float(0) %}
          {% set vl = states('sensor.mitsubishi_wp_vorlauftemperatur') | float(0) %}
          {% set rl = states('sensor.mitsubishi_wp_rucklauftemperatur') | float(0) %}
          {% set el = states('sensor.wp_gesamtverbrauch') | float(0) %}
          {% if el > 200 and flow > 0 and (vl - rl) > 0.5 %}
            {{ ((flow * (vl - rl) * 4186 / 60) / el) | round(2) }}
          {% else %}
            {{ this.state | default(0) }}
          {% endif %}

      # --- COP Heute (Tageswert) ---
      - name: "WP COP Heute"
        unit_of_measurement: ""
        state: >
          {% set waerme = states('sensor.wp_waerme_heute') | float(0) %}
          {% set strom = states('sensor.wp_verbrauch_heute') | float(0) %}
          {% if strom > 0.1 and waerme > 0 %}
            {{ (waerme / strom) | round(2) }}
          {% else %}
            {{ this.state | default(0) }}
          {% endif %}

      # --- Ladewächter: Schichtspeicher-Steuerung (40/50/60 Logik) ---
      # Ein bei < 40°C, Aus bei > 50°C (bzw. 60°C im Boost)
      - name: "WP Ladewaechter"
        state: >
          {% set temp = states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') | float(99) %}
          {% set boost = is_state('input_boolean.wp_boost_aktiv', 'on') %}
          {% set ist_an = is_state('switch.wp_thermostat_in_1', 'on') %}

          {% if temp < 40 %}
            True
          {% elif boost and temp >= 60 %}
            False
          {% elif not boost and temp >= 50 %}
            False
          {% else %}
            {# Behalte den aktuellen Zustand bei (Hysterese) #}
            {{ 'True' if ist_an else 'False' }}
          {% endif %}

      # --- Durchschnittliche Laufzeit pro Zyklus ---
      - name: "WP Laufzeit pro Zyklus"
        unit_of_measurement: "min"
        state: >
          {% set starts = states('counter.wp_starts_heute') | int(0) %}
          {% set laufzeit_h = states('sensor.wp_laufzeit_heute') | float(0) %}
          {% if starts > 0 %}
            {{ (laufzeit_h * 60 / starts) | round(0) }}
          {% else %}
            0
          {% endif %}

      # --- Taktungsbewertung ---
      - name: "WP Taktungsbewertung"
        state: >
          {% set starts = states('counter.wp_starts_heute') | int(0) %}
          {% set laufzeit_h = states('sensor.wp_laufzeit_heute') | float(0) %}
          {% set laeuft = states('binary_sensor.wp_laeuft') %}
          {% set avg_min = (laufzeit_h * 60 / starts) | round(0) if starts > 0 else 0 %}
          {% if starts == 0 and laeuft == 'on' %}
            🟢 Dauerlauf
          {% elif starts == 0 %}
            Kein Betrieb
          {% elif starts <= 2 %}
            🟢 Optimal
          {% elif starts <= 4 and avg_min >= 30 %}
            🟢 Gut
          {% elif starts <= 6 %}
            🟡 Normal
          {% else %}
            🔴 Kritisch
          {% endif %}

      # --- Nachtabsenkung aktiv Anzeige ---
      - name: "WP Nachtabsenkung"
        state: >
          {% if now().hour >= 21 or now().hour < 3 %}
            Aktiv (Soll -3°C)
          {% else %}
            Aus
          {% endif %}

  - binary_sensor:
      # --- WP läuft (für Laufzeit-Messung) ---
      - name: "WP Laeuft"
        state: >
          {{ states('sensor.mitsubishi_wp_warmepumpe_frequenz') | float(0) > 5 }}

# --- Laufzeit heute (history_stats) ---
sensor:
  - platform: history_stats
    name: "WP Laufzeit Heute"
    entity_id: binary_sensor.wp_laeuft
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) }}"
    end: "{{ now() }}"
