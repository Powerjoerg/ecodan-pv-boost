# ==========================================
# WEIHNACHTSBELEUCHTUNG
# ==========================================
- id: weihnachtsbeleuchtung_17_an
  alias: Weihnachtsbeleuchtung 17 Uhr AN
  triggers:
  - at: '17:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: group.weihnachtsbeleuchtung
    action: homeassistant.turn_on
  mode: single

- id: weihnachtsbeleuchtung_22_aus
  alias: Weihnachtsbeleuchtung 22 Uhr AUS
  triggers:
  - at: '22:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: group.weihnachtsbeleuchtung
    action: homeassistant.turn_off
  mode: single

# ==========================================
# WP TAKTUNG & MONITORING
# ==========================================
- id: wp_taktung_zaehlen
  alias: WP Taktung - Start zählen
  description: Zählt jeden WP-Start wenn Verdichter über 5 Hz geht
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    above: 5
    for:
      minutes: 1
    trigger: numeric_state
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.increment
  mode: single

- id: wp_taktung_reset
  alias: WP Taktung - Reset Mitternacht
  description: Setzt den WP-Start-Zähler jeden Tag um Mitternacht zurück
  triggers:
  - at: '00:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.reset
  mode: single

# ==========================================
# WP PV-BOOST LOGIK
# ==========================================
- id: wp_boost_aktivieren
  alias: WP Boost bei PV-Überschuss aktivieren
  description: Boost auf 60°C wenn WP bereits läuft und PV > 1 kW und Batterie > 50%
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    above: 5
    for:
      minutes: 2
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: sensor.pv_power
    above: 1
  - condition: numeric_state
    entity_id: sensor.battery_soc_1
    above: 50
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'off'
  - condition: time
    after: '07:00:00'
    before: '21:00:00'
  actions:
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_on
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: 6000
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: 60
    action: input_number.set_value
  - action: notify.persistent_notification
    data:
      title: WP Boost aktiv
      message: >
        PV: {{ states('sensor.pv_power') | float(0) | round(1) }} kW.
        Batterie: {{ states('sensor.battery_soc_1') | int }}%.
        Speicher: {{ states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') }}°C.
        Soll auf 60°C gesetzt.
  mode: single

- id: wp_boost_beenden
  alias: WP Boost beenden - PV weg oder Tagesende
  description: Soll zurück auf 50°C wenn PV zu niedrig oder 21 Uhr
  triggers:
  - entity_id: sensor.pv_power
    below: 0.8
    for:
      minutes: 5
    trigger: numeric_state
  - at: '21:00:00'
    trigger: time
  conditions:
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'on'
  actions:
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: 5000
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: 50
    action: input_number.set_value
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_off
  - action: notify.persistent_notification
    data:
      title: WP Boost beendet
      message: >
        PV zu niedrig oder Tagesende. Soll zurück auf 50°C.
        Speicher: {{ states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') }}°C.
  mode: single

- id: wp_boost_ziel_erreicht
  alias: WP Boost - Zieltemperatur erreicht
  description: TWW über 59°C - Soll zurück auf 50°C
  triggers:
  - entity_id: sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww
    above: 59
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'on'
  actions:
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: 5000
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: 50
    action: input_number.set_value
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_off
  - action: notify.persistent_notification
    data:
      title: WP Boost Ziel erreicht
      message: >
        Speicher bei {{ states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') }}°C.
        Soll zurück auf 50°C.
  mode: single

- id: wp_boost_wp_gestoppt
  alias: WP Boost - WP hat gestoppt
  description: Kompressor gestoppt während Boost - Soll sofort zurück auf 50°C
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    below: 1
    for:
      minutes: 5
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'on'
  actions:
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: 5000
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: 50
    action: input_number.set_value
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_off
  - action: notify.persistent_notification
    data:
      title: WP Boost - WP gestoppt
      message: >
        WP hat gestoppt bei {{ states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') }}°C.
        Soll zurück auf 50°C.
  mode: single

- id: wp_soll_manuell
  alias: WP Soll-Temperatur manuell setzen
  description: Schreibt Soll-Temp auf WP wenn Slider geändert wird
  triggers:
  - entity_id: input_number.wp_soll_temperatur
    trigger: state
  conditions: []
  actions:
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: "{{ states('input_number.wp_soll_temperatur') | int * 100 }}"
  mode: single

# ==========================================
# WP THERMOSTAT STEUERUNG (IN1)
# ==========================================
- id: wp_thermostat_heizbedarf_an
  alias: WP Thermostat - Heizbedarf AN
  description: Shelly ON wenn Raum unter Soll UND TWW über 40°C
  triggers:
  - entity_id: sensor.wp_heizbedarf
    to: 'True'
    for:
      minutes: 1
    trigger: state
  conditions:
  - condition: numeric_state
    entity_id: sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww
    above: 40
  actions:
  - target:
      entity_id: switch.wp_thermostat_in_1
    action: switch.turn_on
  - action: notify.persistent_notification
    data:
      title: WP Thermostat AN
      message: Heizbedarf erkannt und TWW bereit (>40°C) - Heizung freigegeben.
  mode: single

- id: wp_thermostat_heizbedarf_aus
  alias: WP Thermostat - Heizbedarf AUS
  description: Shelly OFF wenn alle Räume über Soll (5 Min Verzögerung)
  triggers:
  - entity_id: sensor.wp_heizbedarf
    to: 'False'
    for:
      minutes: 5
    trigger: state
  conditions: []
  actions:
  - target:
      entity_id: switch.wp_thermostat_in_1
    action: switch.turn_off
  - action: notify.persistent_notification
    data:
      title: WP Thermostat AUS
      message: Alle Räume über Soll - Heizung gesperrt.
  mode: single

