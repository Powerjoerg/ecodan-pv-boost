# ==========================================
# WP DIAGNOSE (TAKTUNGS-ERKENNUNG)
# ==========================================
- id: wp_takten_erkennung
  alias: WP Takten Erkennung
  description: Erkennt Kurzzyklen mit Ursachen-Diagnose
  mode: single
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    above: 0
    trigger: numeric_state
  actions:
  - delay: "00:00:30"
  - variables:
      start_betriebsart: "{{ states('sensor.mitsubishi_wp_betriebsart') }}"
      start_vorlauf: "{{ states('sensor.mitsubishi_wp_vorlauftemperatur_heizkreis_1') | float(0) }}"
      start_ruecklauf: "{{ states('sensor.mitsubishi_wp_rucklauftemperatur') | float(0) }}"
      start_tww: "{{ states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') | float(0) }}"
      start_tww_soll: "{{ states('sensor.mitsubishi_wp_solltemperatur_wasserspeicher_tww') | float(0) }}"
      start_durchfluss: "{{ states('sensor.mitsubishi_wp_durchflussmenge') | float(0) }}"
      start_shelly: "{{ states('switch.wp_thermostat_in_1') }}"
      start_heizbedarf: "{{ states('sensor.wp_heizbedarf') }}"
      start_defrost: "{{ states('sensor.mitsubishi_wp_abtaubetrieb') }}"
      start_zeit: "{{ now() }}"
      aktive_raeume: >
        {% set rooms = [
          ('Eltern UG', 'climate.st1820_80b54e38809c'),
          ('Flur UG', 'climate.st1820_b08184f2dbc8'),
          ('Esszimmer', 'climate.st1820_b08184f4860c'),
          ('Flur', 'climate.st1820_b08184f48e64'),
          ('Wohnzimmer', 'climate.st1820_b08184f5c164'),
          ('Küche UG', 'climate.st1820_b08184f67248'),
          ('Küche EG', 'climate.t_kuche_eg'),
          ('Büro', 'climate.thermostat_buro')
        ] %} 
        {% set active = namespace(list=[]) %}
        {% for name, entity in rooms %}
          {% set ist = state_attr(entity, 'current_temperature') | float(99) %}
          {% set soll = state_attr(entity, 'temperature') | float(0) %}
          {% if ist < soll %}
            {% set active.list = active.list + [name ~ ' (' ~ ist ~ '/' ~ soll ~ '°C)'] %}
          {% endif %}
        {% endfor %} 
        {{ active.list | join(', ') if active.list | length > 0 else 'Kein Raum unter Soll' }}
  - wait_for_trigger:
    - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
      below: 1
      trigger: numeric_state
    timeout: "01:00:00"
    continue_on_timeout: false
  - variables:
      laufzeit_minuten: "{{ ((as_timestamp(now()) - as_timestamp(start_zeit)) / 60) | round(1) }}"
      ende_vorlauf: "{{ states('sensor.mitsubishi_wp_vorlauftemperatur_heizkreis_1') | float(0) }}"
      ende_ruecklauf: "{{ states('sensor.mitsubishi_wp_rucklauftemperatur') | float(0) }}"
      ende_tww: "{{ states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') | float(0) }}"
      ende_durchfluss: "{{ states('sensor.mitsubishi_wp_durchflussmenge') | float(0) }}"
      aussen_temp: "{{ states('sensor.mitsubishi_wp_aussentemperatur') | float(0) }}"
      spreizung: "{{ (ende_vorlauf - ende_ruecklauf) | round(1) }}"
      diagnose: >
        {% if start_defrost in ['Abtauung', 'Defrost', '2'] %}
          ❄️ Abtauvorgang — kein Fehler
        {% elif start_betriebsart in ['Warmwasser', '1'] %}
          🔵 TWW-Nachheizung (Speicher {{ start_tww }}→{{ ende_tww }}°C, Soll {{ start_tww_soll }}°C)
        {% elif start_betriebsart in ['Heizen', '2'] and ende_durchfluss < 1 %}
          🔴 Kein Durchfluss! Pumpe oder Ventile prüfen
        {% elif start_betriebsart in ['Heizen', '2'] and (ende_vorlauf - ende_ruecklauf) < 1 %}
          🔴 Hydraulischer Kurzschluss! Spreizung {{ spreizung }}°C — Verursacher: {{ aktive_raeume }}
        {% elif start_betriebsart in ['Heizen', '2'] and (ende_vorlauf - start_vorlauf) < 2 %}
          🟡 Kaum Temperaturhub (VL {{ start_vorlauf }}→{{ ende_vorlauf }}°C) → zu wenig Wärmeabnahme
        {% elif start_betriebsart in ['Heizen', '2'] and start_heizbedarf | lower in ['false', 'off', '0'] %}
          🟠 Kein Heizbedarf gemeldet → Shelly-Logik prüfen
        {% elif start_betriebsart in ['Heizen', '2'] %}
          🔴 Laufzeit zu kurz (nur {{ laufzeit_minuten }} Min) → Wärmeabnahme blockiert?
        {% else %}
          ⚪ Betriebsart: {{ start_betriebsart }}
        {% endif %}
  - condition: template
    value_template: "{{ laufzeit_minuten | float < 10 }}"
  - action: notify.persistent_notification
    data:
      title: "⚠️ WP Kurzzyklus erkannt"
      message: >
        Kompressor lief nur {{ laufzeit_minuten }} Minuten!
        📋 Diagnose: {{ diagnose }}
        ⏱️ Start: {{ start_zeit | as_timestamp | timestamp_custom('%H:%M:%S') }}
        🏠 Räume: {{ aktive_raeume }}
        🌡️ Spreizung: {{ spreizung }}°C
  - action: counter.increment
    target:
      entity_id: counter.wp_kurzzyklen_heute
