title: Ecodan PV-Boost
views:
  - title: Hauptübersicht
    path: wp-main
    icon: mdi:heat-pump
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.mitsubishi_wp_warmepumpe_frequenz
            primary: Wärmepumpe
            secondary: >-
              {% set freq = states('sensor.mitsubishi_wp_warmepumpe_frequenz') |
              float(0) %} {% if freq > 5 %}
                🟢 Läuft — {{ freq | round(0) }} Hz
              {% else %}
                ⚫ Aus
              {% endif %}

              Speicher: {{
              states('sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww') | float(0)
              | round(1) }}°C → Soll: {{
              states('sensor.mitsubishi_wp_solltemperatur_wasserspeicher_tww') |
              float(0) | round(0) }}°C | Außen: {{
              states('sensor.mitsubishi_wp_aussentemperatur') | float(0) | round(1) }}°C
            multiline_secondary: true
            icon: mdi:heat-pump
            icon_color: |-
              {% if states('sensor.mitsubishi_wp_warmepumpe_frequenz') | float(0) > 5 %}
                green
              {% else %}
                blue
              {% endif %}
            tap_action:
              action: more-info
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: |-
                  {% set soc = states('sensor.battery_soc_1') | float(0) %}
                  {% if soc > 80 %}
                    mdi:battery-high
                  {% elif soc > 40 %}
                    mdi:battery-medium
                  {% else %}
                    mdi:battery-low
                  {% endif %}
                icon_color: |-
                  {% set soc = states('sensor.battery_soc_1') | float(0) %}
                  {% if soc > 70 %}
                    green
                  {% elif soc > 30 %}
                    orange
                  {% else %}
                    red
                  {% endif %}
                content: "{{ states('sensor.battery_soc_1') | float(0) | round(0) }}%"
              - type: template
                icon: mdi:solar-power
                icon_color: |-
                  {% if states('sensor.solar_energy_today') | float(0) > 0 %}
                    yellow
                  {% else %}
                    grey
                  {% endif %}
                content: >-
                  Erz: {{ states('sensor.solar_energy_today') | float(0) | round(1) }}
                  kWh
              - type: template
                icon: mdi:transmission-tower-export
                icon_color: |-
                  {% if states('sensor.feed_in_energy_today') | float(0) > 0 %}
                    green
                  {% else %}
                    grey
                  {% endif %}
                content: >-
                  Einsp: {{ states('sensor.feed_in_energy_today') | float(0) | round(1)
                  }} kWh
              - type: template
                icon: mdi:flash
                icon_color: |-
                  {% set pv = states('sensor.pv_power') | float(0) %}
                  {% if pv > 1 %}
                    green
                  {% elif pv > 0.1 %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
                content: "PV: {{ (states('sensor.pv_power') | float(0) * 1000) | round(0) }} W"
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.mitsubishi_wp_warmepumpe_frequenz
                primary: Verdichter
                secondary: >-
                  {{ states('sensor.mitsubishi_wp_warmepumpe_frequenz') | float(0) |
                  round(0) }} Hz
                icon: mdi:engine
                icon_color: >-
                  {% if states('sensor.mitsubishi_wp_warmepumpe_frequenz') | float(0) >
                  5 %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.mitsubishi_wp_vorlauftemperatur_heizkreis_1
                primary: Vorlauf
                secondary: >-
                  {{ states('sensor.mitsubishi_wp_vorlauftemperatur_heizkreis_1') |
                  float(0) | round(1) }} °C
                icon: mdi:thermometer-chevron-up
                icon_color: >-
                  {% if states('sensor.mitsubishi_wp_vorlauftemperatur_heizkreis_1') |
                  float(0) > 30 %}
                    red
                  {% else %}
                    blue
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.mitsubishi_wp_betriebsart
                primary: Betriebsart
                secondary: "{{ states('sensor.mitsubishi_wp_betriebsart') }}"
                icon: mdi:cog
                icon_color: |-
                  {% if states('sensor.mitsubishi_wp_betriebsart') != 'Stopp' %}
                    green
                  {% else %}
                    grey
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.wp_gesamtverbrauch
                primary: WP Leistung
                secondary: >-
                  {% set total = states('sensor.wp_gesamtverbrauch') | float(0) %} {% if
                  total > 1000 %}
                    {{ (total / 1000) | round(2) }} kW
                  {% else %}
                    {{ total | round(0) }} W
                  {% endif %}
                icon: mdi:lightning-bolt
                icon_color: |-
                  {% if states('sensor.wp_gesamtverbrauch') | float(0) > 100 %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
          - type: custom:mushroom-number-card
            entity: input_number.wp_soll_temperatur
            display_mode: buttons
            name: Soll-Temperatur TWW
            icon: mdi:thermometer-plus
            
          # --- NEUER BEREICH: RÜCKKANAL DIAGNOSE ---
          - type: custom:mushroom-template-card
            entity: sensor.wp_rueckkanal_status
            primary: Modbus Feedback (Rückkanal)
            secondary: >-
              {{ states('sensor.wp_rueckkanal_status') }} (Delta: {{ states('sensor.wp_regelabweichung') }}K)
            icon: |-
              {% if 'Drift' in states('sensor.wp_rueckkanal_status') %}
                mdi:sync-alert
              {% else %}
                mdi:sync
              {% endif %}
            icon_color: |-
              {% if 'Drift' in states('sensor.wp_rueckkanal_status') %}
                red
              {% elif 'Leicht' in states('sensor.wp_rueckkanal_status') %}
                orange
              {% else %}
                green
              {% endif %}
            tap_action:
              action: more-info
          # -----------------------------------------

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.wp_cop
                primary: COP Aktuell
                secondary: |-
                  {% set cop = states('sensor.wp_cop') | float(0) %} {% if cop > 0 %}
                    {{ cop }}
                  {% else %}
                    —
                  {% endif %}
                icon: mdi:gauge
                icon_color: |-
                  {% set cop = states('sensor.wp_cop') | float(0) %}
                  {% if cop >= 4 %}
                    green
                  {% elif cop >= 3 %}
                    orange
                  {% elif cop > 0 %}
                    red
                  {% else %}
                    grey
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.wp_cop_heute
                primary: COP Heute
                secondary: >-
                  {% set cop = states('sensor.wp_cop_heute') | float(0) %} {% if cop > 0
                  %}
                    {{ cop }}
                  {% else %}
                    —
                  {% endif %}
                icon: mdi:chart-line
                icon_color: |-
                  {% set cop = states('sensor.wp_cop_heute') | float(0) %}
                  {% if cop >= 4 %}
                    green
                  {% elif cop >= 3 %}
                    orange
                  {% elif cop > 0 %}
                    red
                  {% else %}
                    grey
                  {% endif %}
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.wp_verbrauch_heute
                primary: WP Heute
                secondary: "{{ states('sensor.wp_verbrauch_heute') | float(0) | round(2) }} kWh"
                icon: mdi:hours-24
                icon_color: teal
              - type: custom:mushroom-template-card
                entity: sensor.wp_verbrauch_monat
                primary: WP Monat
                secondary: "{{ states('sensor.wp_verbrauch_monat') | float(0) | round(2) }} kWh"
                icon: mdi:calendar-month
                icon_color: teal
              - type: custom:mushroom-template-card
                entity: sensor.wp_verbrauch_jahr
                primary: WP Jahr
                secondary: "{{ states('sensor.wp_verbrauch_jahr') | float(0) | round(2) }} kWh"
                icon: mdi:calendar
                icon_color: teal
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: counter.wp_starts_heute
                primary: Taktung
                multiline_secondary: true
                secondary: |-
                  {% set starts = states('counter.wp_starts_heute') | int(0) %}
                  {% set lz = states('sensor.wp_laufzeit_pro_zyklus') | float(0) %}
                  {{ starts }} Starts (Ø {{ lz | round(0) }} min)
                  {% set abtau = states('counter.wp_abtauzyklen_heute') | int(0) %}
                  {% if abtau > 0 %}
                    ❄️ {{ abtau }} Abtau-Zyklen
                  {% endif %}
                icon: mdi:restart
                icon_color: |-
                  {% set starts = states('counter.wp_starts_heute') | int(0) %}
                  {% if starts > 10 %}
                    red
                  {% elif starts > 6 %}
                    orange
                  {% else %}
                    green
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.wp_taktungsbewertung
                primary: Bewertung
                secondary: "{{ states('sensor.wp_taktungsbewertung') }}"
                icon: mdi:check-decagram
                icon_color: |-
                  {% set bew = states('sensor.wp_taktungsbewertung') %}
                  {% if 'Optimal' in bew %}
                    green
                  {% elif 'Normal' in bew %}
                    yellow
                  {% elif 'Beobachten' in bew %}
                    orange
                  {% elif 'Kritisch' in bew %}
                    red
                  {% else %}
                    grey
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: input_boolean.wp_boost_aktiv
                primary: PV Boost
                secondary: |-
                  {% if is_state('input_boolean.wp_boost_aktiv', 'on') %}
                    🔥 Aktiv — 60°C
                  {% else %}
                    Inaktiv — 50°C
                  {% endif %}
                icon: mdi:solar-power-variant
                icon_color: |-
                  {% if is_state('input_boolean.wp_boost_aktiv', 'on') %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
                tap_action:
                  action: toggle
